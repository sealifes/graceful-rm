name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...
      - run: GOOS=windows GOARCH=amd64 go build ./cmd/graceful-rm ./cmd/graceful-rm-hook
      - run: bash -n install.sh scripts/install.sh scripts/install-hooks.sh
